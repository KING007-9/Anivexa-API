<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anivexa API</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0c0c0f;
      --border:   #1e1e26;
      --text:     #e6e6f0;
      --muted:    #5a5a6e;
      --accent:   #818cf8;
      --purple:   #c084fc;
      --surface:  rgba(255,255,255,.04);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(129,140,248,.08) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      pointer-events: none;
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 520px;
      width: 100%;
      z-index: 1;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 28px;
      filter: drop-shadow(0 0 28px rgba(129,140,248,.35));
    }

    h1 {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -1.2px;
      line-height: 1;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #e6e6f0 30%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
      opacity: .8;
    }

    .desc {
      font-size: 16px;
      line-height: 1.65;
      color: var(--muted);
      max-width: 400px;
      margin-bottom: 36px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 26px;
      background: var(--text);
      color: var(--bg);
      font-size: 14px;
      font-weight: 700;
      border-radius: 8px;
      text-decoration: none;
      transition: opacity .15s, transform .15s;
      letter-spacing: -.1px;
    }

    .btn-primary:hover {
      opacity: .88;
      transform: translateY(-1px);
    }

    .btn-primary svg {
      flex-shrink: 0;
    }

    .icon-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      background: transparent;
      text-decoration: none;
      transition: color .15s, border-color .15s, background .15s, transform .15s;
    }

    .btn-icon:hover {
      color: var(--text);
      border-color: rgba(255,255,255,.15);
      background: var(--surface);
      transform: translateY(-1px);
    }

    .badge-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .05em;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-size: 12.5px;
      color: var(--muted);
      opacity: .5;
      transition: opacity .2s;
    }

    footer:hover { opacity: 1; }

    @media (max-width: 480px) {
      h1 { font-size: 32px; }
      .logo { width: 64px; height: 64px; }
      .desc { font-size: 15px; }
    }
  </style>
</head>
<body>

<div class="glow"></div>

<div class="card">
  <img src="logo.svg" alt="Anivexa" class="logo"/>

  <h1>Anivexa</h1>
  <p class="tagline">Streaming Aggregator API</p>

  <p class="desc">
    A unified API for anime stream sources. Resolve episodes and watch links across 11 providers using a single AniList ID — exact-match identity, no guessing.
  </p>

    </div>
  </div>

  <div class="badge-row">
    <span class="badge">11 Providers</span>
    <span class="badge">AniList ID</span>
    <span class="badge">No Auth</span>
    <span class="badge">CORS Enabled</span>
  </div>
</div>

<footer>© 2026 Anivexa. All rights reserved.</footer>

</html>
